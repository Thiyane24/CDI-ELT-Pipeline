---
x-airflow-common:
  &airflow-common

  image: ${DOCKERHUB_NAMESPACE}/${DOCKERHUB_REPOSITORY}:${IMAGE_TAG:-latest}

  environment:
    &airflow-common-env

    AIRFLOW__CORE__EXECUTOR: CeleryExecutor

    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${METADATA_DATABASE_USERNAME}:${METADATA_DATABASE_PASSWORD}@postgres:5432/${METADATA_DATABASE_NAME}

    AIRFLOW__CELERY__RESULT_BACKEND: >-
      db+postgresql://${CELERY_BACKEND_USERNAME}:${CELERY_BACKEND_PASSWORD}@postgres:5432/${CELERY_BACKEND_NAME}

    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0

    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}

    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"

    AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session

    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"

    AIRFLOW_CONN_POSTGRES_DB_YT_ELT: >-
      postgresql://${ELT_DATABASE_USERNAME}:${ELT_DATABASE_PASSWORD}@postgres:5432/${ELT_DATABASE_NAME}

    AIRFLOW_VAR_API_KEY: ${API_KEY}

    AIRFLOW_VAR_CHANNEL_HANDLE: ${CHANNEL_HANDLE}

    ELT_DATABASE_NAME: ${ELT_DATABASE_NAME}
    ELT_DATABASE_USERNAME: ${ELT_DATABASE_USERNAME}
    ELT_DATABASE_PASSWORD: ${ELT_DATABASE_PASSWORD}

    POSTGRES_CONN_HOST: postgres
    POSTGRES_CONN_PORT: 5432

  volumes:
    - ./config:/opt/airflow/config
    - ./dags:/opt/airflow/dags
    - ./Data:/opt/airflow/Data
    - ./include:/opt/airflow/include
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./tests:/opt/airflow/tests

  user: "${AIRFLOW_UID}:0"

  depends_on:
    &airflow-common-depends-on

    redis:
      condition: service_healthy

    postgres:
      condition: service_healthy

services:

  postgres:
    image: postgres:13
    container_name: postgres

    environment:
      POSTGRES_USER: ${POSTGRES_CONN_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_CONN_PASSWORD}

      METADATA_DATABASE_NAME: ${METADATA_DATABASE_NAME}
      METADATA_DATABASE_USERNAME: ${METADATA_DATABASE_USERNAME}
      METADATA_DATABASE_PASSWORD: ${METADATA_DATABASE_PASSWORD}

      ELT_DATABASE_NAME: ${ELT_DATABASE_NAME}
      ELT_DATABASE_USERNAME: ${ELT_DATABASE_USERNAME}
      ELT_DATABASE_PASSWORD: ${ELT_DATABASE_PASSWORD}

      CELERY_BACKEND_NAME: ${CELERY_BACKEND_NAME}
      CELERY_BACKEND_USERNAME: ${CELERY_BACKEND_USERNAME}
      CELERY_BACKEND_PASSWORD: ${CELERY_BACKEND_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh

    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-U",
          "${POSTGRES_CONN_USERNAME}",
          "-d",
          "${METADATA_DATABASE_NAME}"
        ]

      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    restart: always

  redis:
    image: redis:7.2-bookworm
    container_name: redis

    expose:
      - 6379

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    restart: always

  airflow-init:
    <<: *airflow-common

    container_name: airflow-init

    entrypoint: /bin/bash

    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins /sources/tests
        chown -R "${AIRFLOW_UID}:0" /sources
        exec /entrypoint airflow version

    environment:
      <<: *airflow-common-env

      _AIRFLOW_DB_MIGRATE: "true"

      _AIRFLOW_WWW_USER_CREATE: "true"

      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_WWW_USER_USERNAME}

      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_WWW_USER_PASSWORD}

    user: "0:0"

    volumes:
      - .:/sources

  airflow-webserver:
    <<: *airflow-common

    container_name: airflow-webserver

    command: webserver

    ports:
      - "8080:8080"

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]

      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    restart: always

    depends_on:
      <<: *airflow-common-depends-on

      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common

    container_name: airflow-scheduler

    command: scheduler

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]

      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    restart: always

    depends_on:
      <<: *airflow-common-depends-on

      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common

    container_name: airflow-worker

    command: celery worker

    environment:
      <<: *airflow-common-env

      DUMB_INIT_SETSID: "0"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
        ]

      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    restart: always

    depends_on:
      <<: *airflow-common-depends-on

      airflow-init:
        condition: service_completed_successfully

  airflow-cli:
    <<: *airflow-common

    container_name: airflow-cli

    profiles:
      - debug

    environment:
      <<: *airflow-common-env

      CONNECTION_CHECK_MAX_COUNT: "0"

    command:
      - bash
      - -c
      - airflow

volumes:
  postgres-db-volume: